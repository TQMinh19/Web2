<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giỏ hàng của bạn | 3BK Shop</title>
    <link rel="stylesheet" href="../CSS/cart.css" />
  </head>

  <body>
    <!-- Giỏ hàng -->
    <div class="giohang">
      <div class="giohang3bk">
        <img src="../Image/logo.jpg" alt="Logo" class="logo" />
        <h2>3BK Shop | Giỏ Hàng</h2>
      </div>
      <div class="timkiem">
        <div class="search-box">
          <input type="text" placeholder="Tìm kiếm..." />
          <button><span class="search-icon">🔍</span></button>
        </div>
      </div>
    </div>

    <!-- Danh sách sản phẩm -->
    <div class="container">
      <div class="dssp">
        <header>
          <h2>Danh sách sản phẩm <small id="count">(0)</small></h2>
        </header>
        <div class="selectall">
          <input type="checkbox" id="select-all" />
          <label for="select-all" class="text-h3">Chọn tất cả</label>
          <span class="text-h3" id="select-count">Đã chọn (0)</span>
        </div>
        <div class="cart-header">
          <div class="col-title col-sanpham">Sản phẩm</div>
          <div class="col-title col-soluong">Số lượng</div>
          <div class="col-title col-sotien">Tổng tiền</div>
          <div class="col-title col-thaotac">Xoá</div>
        </div>
        <main>
          <section class="sanpham" id="sanpham "></section>
        </main>
      </div>

      <!-- Ô thanh toán -->
      <aside class="thanhtoan">
        <h2>
          Thanh toán
          <small id="count" style="color: var(--muted); font-weight: 600"
            >(0)</small
          >
        </h2>
        <div class="thanhtoan-list" id="thanhtoan-list"></div>
        <div class="totals">
          <div><span>Tạm tính</span><span id="subtotal">0₫</span></div>
          <div><span>Phí vận chuyển</span><span id="shipping">0₫</span></div>
          <div style="font-weight: 700">
            <span>Tổng</span><span id="total">0₫</span>
          </div>
        </div>
        <div class="checkout">
          <button class="btn" id="checkout">Mua hàng</button>
          <button class="btn ghost" id="clear">Xóa giỏ</button>
        </div>
      </aside>
    </div>
  </body>
  <script src="main.js"></script>
</html>
