<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giỏ hàng của bạn | 3BK Shop</title>
    <link rel="stylesheet" href="../CSS/cart.css" />
  </head>

  <body>
    <div class="giohang">
      <div class="giohang3bk">
        <img src="../Image/logo.jpg" alt="Logo" class="logo" />
        <h2>3BK Shop | Giỏ Hàng</h2>
      </div>

      <div class="timkiem">
        <div class="search-box">
          <input type="text" placeholder="Tìm kiếm..." />
          <button><span class="search-icon">🔍</span></button>
        </div>
      </div>
    </div>

    <div class="container">
      <div class="dssp">
        <header>
          <h2>Danh sách sản phẩm <small id="count">(0)</small></h2>
        </header>

        <div class="selectall">
          <input type="checkbox" id="select-all" />
          <label for="select-all" class="text-h3">Chọn tất cả</label>
          <span class="text-h3" id="select-count">Đã chọn (0)</span>
        </div>

        <div class="cart-header">
          <div class="col-sanpham item-info">
            <div class="col-title">Sản phẩm</div>
          </div>
          <div class="col-title col-soluong">Số lượng</div>
          <div class="col-title col-sotien">Tổng tiền</div>
          <div class="col-title col-thaotac">Xoá</div>
        </div>

        <main>
          <section class="sanpham" id="sanpham "></section>

          <div class="cart-item">
            <div class="col-sanpham item-info">
              <input type="checkbox" class="item-check" />
              <img
                src="../Image/VICTORIA TEE.jpg"
                alt="Victoria Tee"
                class="item-thumb"
              />
              <div class="item-details">
                <div class="product-name">VICTORIA TEE</div>
                <div class="product-price">300.000đ</div>
              </div>
            </div>

            <div class="col-soluong">
              <div class="qty-control">
                <button>-</button>
                <input type="text" value="1" readonly />
                <button>+</button>
              </div>
            </div>

            <div class="col-sotien price-total">300.000đ</div>

            <div class="col-thaotac">
              <button class="btn-delete">🗑️</button>
            </div>
          </div>

          <div class="cart-item">
            <div class="col-sanpham item-info">
              <input type="checkbox" class="item-check" />
              <img
                src="../Image/product2.jpg"
                alt="DCXRS DESERT SKY T-SHIRT BLACK"
                class="item-thumb"
              />
              <div class="item-details">
                <div class="product-name">DCXRS DESERT SKY T-SHIRT BLACK</div>
                <div class="product-price">420.000đ</div>
              </div>
            </div>

            <div class="col-soluong">
              <div class="qty-control">
                <button>-</button>
                <input type="text" value="1" readonly />
                <button>+</button>
              </div>
            </div>

            <div class="col-sotien price-total">420.000đ</div>

            <div class="col-thaotac">
              <button class="btn-delete">🗑️</button>
            </div>
          </div>
        </main>
      </div>

      <aside class="thanhtoan">
        <h2>
          Thanh toán
          <small id="count" style="color: var(--muted); font-weight: 600"
            >(0)</small
          >
        </h2>

        <div class="thanhtoan-list" id="thanhtoan-list"></div>

        <div class="totals">
          <div>
            <span>Tạm tính</span>
            <span id="subtotal">0₫</span>
          </div>
          <div>
            <span>Phí vận chuyển</span>
            <span id="shipping">0₫</span>
          </div>
          <div style="font-weight: 700">
            <span>Tổng</span>
            <span id="total">0₫</span>
          </div>
        </div>

        <div class="checkout">
          <a href="giohang.html">
            <button class="btn" id="checkout">Mua hàng</button>
          </a>
          <button class="btn ghost" id="clear">Xóa giỏ</button>
        </div>
      </aside>
    </div>
  </body>

  <script src="main.js"></script>
</html>
