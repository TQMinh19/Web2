<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3BK SHOP QUẦN ÁO</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../CSS/main.css" />
</head>

<body>
  <header class="main-header">
    <div class="header-container">
      <div class="header-left">
        <img src="../Image/logo.jpg" alt="Logo" class="logo" />
      </div>
      <nav class="header-nav">
        <div class="nav-top">
          <ul>
            <li><a href="shop.html">SHOP</a></li>
            <li><a href="#">THE ROLLING STONES</a></li>
            <li><a href="#">COLLAB'S</a></li>
            <li><a href="#">OUTLET</a></li>
            <li><a href="#">CONTACT</a></li>
            <li><a href="#">ABOUT US</a></li>
          </ul>
        </div>
        <div class="nav-bottom">
          <ul>
            <li class="best-seller"><a href="#">BEST SELLER</a></li>
          </ul>
        </div>
      </nav>
      <div class="header-right">
        <div class="search-box">
          <input type="text" placeholder="Tìm kiếm..." />
          <button><span class="search-icon">🔍</span></button>
        </div>
        <span class="icon user-icon">👤</span>
        <a href="cart.html" class="cart-link">
          <span class="icon cart-icon">🛒<span class="cart-count">0</span></span>
        </a>
        <span class="lang-select">Vi</span>
        <span class="lang-select">En</span>
      </div>
    </div>

    <div class="slideshow">
      <img src="../Image/stussy_logo.jpg" class="slide active" alt="Banner 1" />
      <img src="../Image/stussy.jpg" class="slide" alt="Banner 2" />
      <!-- <img src="../Image/logo.jpg" class="slide" alt="Banner 3"> -->
    </div>
  </header>

  <section class="hot-deal">
    <h2>HOT DEAL & SALE</h2>
    <div class="divider">
      <span>///</span>
    </div>
    <p><strong>Kết Thúc Trong:</strong></p>
    <div class="countdown">
      <div id="hours">00</div>
      <div id="minutes">00</div>
      <div id="seconds">00</div>
    </div>
  </section>

  <!-- Login Checkbox Toggle -->
  <input type="checkbox" id="loginToggle" class="login-toggle">

  <!-- Login Modal - CSS Only -->
  <div class="login-modal">
    <div class="modal-content">
      <label for="loginToggle" class="close-btn">&times;</label>
      <h2>Đăng nhập</h2>
      <form id="loginForm" action="#" method="post">
        <div class="form-group">
          <input type="email" id="email" name="email" placeholder="Email" required>
        </div>
        <div class="form-group">
          <input type="password" id="password" name="password" placeholder="Mật Khẩu" required>
        </div>
        <button class="submit-btn" type="submit">Đăng nhập</button>
      </form>
      <div class="social-links">
        <a class="social-btn google-btn" href="#">
          <img src="../Image/goo.png" alt="Google">
          Google
        </a>
        <a class="social-btn facebook-btn" href="#">
          <img src="../Image/face.jpg" alt="Facebook">
          Facebook
        </a>
      </div>
      <div class="auth-links">
        <a href="../HTML/quenmatkhau.html">Quên mật khẩu?</a>
        <span>|</span>
        <a href="../HTML/dangky.html">Đăng ký</a>
      </div>
    </div>
  </div>

  <script src="../JS/main.js"></script>
</body>

</html>
